name: Label referenced issues on PR merge

on:
  pull_request_target:
    types: [closed]
    branches: [dev, staging]

permissions:
  issues: write
  pull-requests: read

jobs:
  label-referenced-issues:
    name: Apply status:merged-staging to referenced issues
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Apply label to referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Match closing keywords: Closes, Fixes, Resolves (case-insensitive).
            // Supports bare references (#123), optional colon (Closes: #123),
            // and full GitHub issue URLs for this repository only.
            // Pattern is built dynamically to restrict URL matches to the current repo,
            // preventing a cross-repo URL from silently labeling the wrong issue number.
            const owner = context.repo.owner.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const repo = context.repo.repo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const urlPrefix = `https://github\\.com/${owner}/${repo}/issues/`;
            const pattern = new RegExp(
              `\\b(?:closes|fixes|resolves)\\b\\s*:?\\s*(?:${urlPrefix}|#)(\\d+)`,
              'gi'
            );
            const matches = [...body.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No referenced issues found in PR body.');
              return;
            }

            // Deduplicate issue numbers
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1], 10)))];
            console.log(`Referenced issues: ${issueNumbers.join(', ')}`);

            const label = 'status:merged-staging';

            // Ensure the label exists in the repo, create it if not
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: '0075ca',
                  description: 'Issue resolved in dev or staging, pending promotion to main',
                });
                console.log(`Created label '${label}'.`);
              } else {
                throw e;
              }
            }

            for (const issueNumber of issueNumbers) {
              try {
                // Fetch the item to check labels and confirm it is an issue, not a PR
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });

                if (issue.pull_request) {
                  console.log(`#${issueNumber} is a pull request, skipping.`);
                  continue;
                }

                const alreadyLabeled = issue.labels.some(l => l.name === label);
                if (alreadyLabeled) {
                  console.log(`Issue #${issueNumber} already has label '${label}', skipping.`);
                  continue;
                }

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [label],
                });
                console.log(`Applied '${label}' to issue #${issueNumber}.`);
              } catch (e) {
                if (e.status === 404) {
                  console.log(`#${issueNumber} not found (404), skipping.`);
                  continue;
                }
                throw e;
              }
            }
